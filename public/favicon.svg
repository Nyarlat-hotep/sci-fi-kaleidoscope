<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Ambient halo -->
  <circle cx="16" cy="16" r="13" fill="url(#halo)"/>

  <!-- Glow copy of outer diamond -->
  <polygon points="16,3 29,16 16,29 3,16"
    fill="none" stroke="#00e5ff" stroke-width="3"
    stroke-opacity="0.4" filter="url(#softglow)"/>

  <!-- Glow copy of inner diamond -->
  <polygon points="16,8 24,16 16,24 8,16"
    fill="none" stroke="#00e5ff" stroke-width="2"
    stroke-opacity="0.35" filter="url(#softglow)"/>

  <!-- Outer diamond -->
  <polygon points="16,3 29,16 16,29 3,16"
    fill="none" stroke="#00e5ff" stroke-width="1"
    stroke-opacity="0.9" filter="url(#glow)"/>

  <!-- Inner diamond with subtle fill -->
  <polygon points="16,8 24,16 16,24 8,16"
    fill="#00e5ff" fill-opacity="0.07"
    stroke="#00e5ff" stroke-width="0.7"
    stroke-opacity="0.65" filter="url(#glow)"/>

  <!-- Horizontal cut -->
  <line x1="3" y1="16" x2="29" y2="16"
    stroke="#00e5ff" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Diagonal facet lines: top-left to bottom-right quadrant hints -->
  <line x1="16" y1="3"  x2="29" y2="16" stroke="#00e5ff" stroke-width="0.4" stroke-opacity="0.2"/>
  <line x1="3"  y1="16" x2="16" y2="29" stroke="#00e5ff" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Center dot glow -->
  <circle cx="16" cy="16" r="3" fill="#00e5ff" fill-opacity="0.3" filter="url(#softglow)"/>
  <!-- Center dot crisp -->
  <circle cx="16" cy="16" r="1.6" fill="#00e5ff" fill-opacity="1"/>
</svg>
